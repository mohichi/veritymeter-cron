name = "veritymeter-cron"
main = "index.js"
compatibility_date = "2026-06-01"

# NHK・共同通信の2媒体を担当（残り6媒体はveritymeter-cron2が担当）
# アカウント全体のCron Trigger上限が5個のため、2+3の配分にしている
[triggers]
crons = [
  "0 21 * * *",   # nhk   JST 6:00
  "16 21 * * *",  # kyodo JST 6:16
]

# KVストレージのバインディング設定
# 実際のIDは `wrangler kv namespace create NEWS_KV` 実行後に発行されるものに置き換える
[[kv_namespaces]]
binding = "NEWS_KV"
id = "3d335e51fee5461988205d8d61456acf"
